<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Roomba</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --dim: #2a2a3a;
    --text: #c8c8d8;
    --btn-bg: #161620;
    --btn-active: #00e5ff22;
    --btn-border: #2a2a40;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    touch-action: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    gap: 10px;
  }

  .statusbar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.1em;
    opacity: 0.7;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  .speed-bar-wrap {
    width: min(360px, 94vw);
    height: 3px;
    background: var(--dim);
    border-radius: 2px;
    overflow: hidden;
  }
  .speed-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: background 0.1s;
  }
  .speed-bar.braking { background: var(--accent2); }

  .pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 8px;
    width: min(360px, 94vw);
    aspect-ratio: 1;
  }

  .btn {
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, transform 0.08s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .btn.active {
    background: var(--btn-active);
    border-color: var(--accent);
    transform: scale(0.95);
  }
  .btn svg {
    width: 28px; height: 28px;
    stroke: var(--text); fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    transition: stroke 0.1s;
  }
  .btn.active svg { stroke: var(--accent); }
  .btn.stop { border-color: var(--dim); }
  .btn.stop svg { stroke: var(--accent2); }
  .btn.stop.active { background: #ff3d7122; border-color: var(--accent2); }

  /* サブコントロール行 */
  .subcontrols {
    display: flex;
    gap: 10px;
    width: min(360px, 94vw);
  }

  .subbtn {
    flex: 1;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    border-radius: 10px;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text);
    opacity: 0.7;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .subbtn:active, .subbtn.active {
    background: var(--btn-active);
    border-color: var(--accent);
    opacity: 1;
    transform: scale(0.97);
  }
  .subbtn svg {
    width: 18px; height: 18px;
    stroke: currentColor; fill: none;
    stroke-width: 1.8; stroke-linecap: round;
  }

  /* 調整パネル */
  .tuning-panel {
    display: none;
    flex-direction: column;
    gap: 8px;
    width: min(360px, 94vw);
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .tuning-panel.open { display: flex; }

  .tuning-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.06em;
  }
  .tuning-row label {
    flex: 0 0 120px;
    color: var(--text);
    opacity: 0.6;
  }
  .tuning-row input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .tuning-row .val {
    flex: 0 0 44px;
    text-align: right;
    color: var(--accent);
    font-size: 10px;
  }

  .log {
    width: min(360px, 94vw);
    font-size: 10px;
    letter-spacing: 0.05em;
    opacity: 0.4;
    text-align: center;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  /* グラフ */
  .graphs {
    display: none;
    gap: 8px;
    width: min(360px, 94vw);
  }
  .graphs.open { display: flex; }

  .graph-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .graph-label {
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--text);
    opacity: 0.5;
    text-align: center;
  }
  .graph-wrap canvas {
    width: 100%;
    border-radius: 6px;
    background: #0d0d14;
    border: 1px solid var(--btn-border);
    display: block;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<div class="statusbar">
  <div><span class="status-dot" id="dot"></span><span id="status-text">DISCONNECTED</span></div>
  <div>ROOMBA CTRL</div>
  <a href="/sound.html" style="color:var(--text);text-decoration:none;font-size:10px;opacity:0.6;letter-spacing:0.06em;">SOUND →</a>
</div>

<div class="speed-bar-wrap">
  <div class="speed-bar" id="speed-bar"></div>
</div>

<div class="pad">
  <div class="btn" id="btn-forward_left">
    <svg viewBox="0 0 24 24"><line x1="18" y1="18" x2="6" y2="6"/><polyline points="6,6 6,14"/><polyline points="6,6 14,6"/></svg>
  </div>
  <div class="btn" id="btn-forward">
    <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg>
  </div>
  <div class="btn" id="btn-forward_right">
    <svg viewBox="0 0 24 24"><line x1="6" y1="18" x2="18" y2="6"/><polyline points="18,6 18,14"/><polyline points="18,6 10,6"/></svg>
  </div>
  <div class="btn" id="btn-left">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,5 5,12 12,19"/></svg>
  </div>
  <div class="btn stop" id="btn-stop">
    <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
  </div>
  <div class="btn" id="btn-right">
    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
  </div>
  <div class="btn" id="btn-backward_left">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><polyline points="6,18 6,10"/><polyline points="6,18 14,18"/></svg>
  </div>
  <div class="btn" id="btn-backward">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="5,12 12,19 19,12"/></svg>
  </div>
  <div class="btn" id="btn-backward_right">
    <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><polyline points="18,18 18,10"/><polyline points="18,18 10,18"/></svg>
  </div>
</div>

<div class="subcontrols">
  <div class="subbtn" id="mode-btn">
    <svg id="mode-icon" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    <span id="mode-label">SAFE</span>
  </div>
  <div class="subbtn" id="tuning-toggle-btn">
    <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="8" cy="6" r="2" fill="var(--bg)"/><circle cx="16" cy="12" r="2" fill="var(--bg)"/><circle cx="10" cy="18" r="2" fill="var(--bg)"/></svg>
    TUNING
  </div>
</div>

<div class="tuning-panel" id="tuning-panel">
  <div class="tuning-row">
    <label>MAX SPEED</label>
    <input type="range" id="t-max-speed" min="50" max="500" step="10" value="300">
    <span class="val" id="v-max-speed">300</span>
  </div>
  <div class="tuning-row">
    <label>INITIAL SPEED</label>
    <input type="range" id="t-init-speed" min="0" max="150" step="5" value="50">
    <span class="val" id="v-init-speed">50</span>
  </div>
  <div class="tuning-row">
    <label>ACCEL EASE</label>
    <input type="range" id="t-accel-ease" min="0.05" max="0.8" step="0.05" value="0.35">
    <span class="val" id="v-accel-ease">0.35</span>
  </div>
  <div class="tuning-row">
    <label>DECEL MS</label>
    <input type="range" id="t-decel-ms" min="50" max="1000" step="50" value="250">
    <span class="val" id="v-decel-ms">250</span>
  </div>
  <div class="tuning-row">
    <label>CURVE RATIO</label>
    <input type="range" id="t-curve" min="0.0" max="1.0" step="0.05" value="0.25">
    <span class="val" id="v-curve">0.25</span>
  </div>
</div>

<div class="graphs" id="graphs">
  <div class="graph-wrap">
    <div class="graph-label">ACCEL</div>
    <canvas id="canvas-accel" height="70"></canvas>
  </div>
  <div class="graph-wrap">
    <div class="graph-label">DECEL</div>
    <canvas id="canvas-decel" height="70"></canvas>
  </div>
</div>

<div class="log" id="log">---</div>

<script>
// ── OI コマンド生成 ──────────────────────────────────
const OI_START       = 128;
const OI_SAFE        = 131;
const OI_FULL        = 132;
const OI_DRIVEDIRECT = 145;

function int16Bytes(v) {
  v = Math.max(-32768, Math.min(32767, Math.round(v)));
  return [(v >> 8) & 0xff, v & 0xff];
}
function driveDirect(right, left) {
  const [rh, rl] = int16Bytes(right);
  const [lh, ll] = int16Bytes(left);
  return new Uint8Array([OI_DRIVEDIRECT, rh, rl, lh, ll]);
}
function oiCmd(opcode) { return new Uint8Array([opcode]); }

// ── WebSocket ────────────────────────────────────────
const dot        = document.getElementById('dot');
const statusText = document.getElementById('status-text');
const logEl      = document.getElementById('log');
const speedBar   = document.getElementById('speed-bar');

let ws = null;
let reconnectTimer = null;

function setLog(msg) { logEl.textContent = msg; }
function send(bytes) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(bytes);
}

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    dot.classList.add('connected');
    statusText.textContent = 'CONNECTED';
    setLog('connection established');
    clearTimeout(reconnectTimer);
    send(oiCmd(OI_START));
    setTimeout(() => send(oiCmd(OI_SAFE)), 100);
  };
  ws.onclose = () => {
    dot.classList.remove('connected');
    statusText.textContent = 'DISCONNECTED';
    setLog('reconnecting...');
    reconnectTimer = setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}

// ── チューニングパラメータ ───────────────────────────
const params = {
  maxSpeed:    300,
  initSpeed:   50,
  accelEase:   0.35,
  decelMs:     250,
  curveRatio:  0.25,
};

const TICK_MS   = 50;
const ACCEL_SNAP = 3;

function getDecelStep() {
  return params.maxSpeed / (params.decelMs / TICK_MS);
}

function getCmdVecs() {
  const c = params.curveRatio;
  return {
    forward:        [ 1,  1],
    backward:       [-1, -1],
    left:           [ 1, -1],
    right:          [-1,  1],
    forward_left:   [ 1,  c],
    forward_right:  [ c,  1],
    backward_left:  [-1, -c],
    backward_right: [-c, -1],
  };
}

// チューニングUI
const tuningDefs = [
  { id: 't-max-speed',  val: 'v-max-speed',  key: 'maxSpeed',   fmt: v => Math.round(v) },
  { id: 't-init-speed', val: 'v-init-speed', key: 'initSpeed',  fmt: v => Math.round(v) },
  { id: 't-accel-ease', val: 'v-accel-ease', key: 'accelEase',  fmt: v => v.toFixed(2)  },
  { id: 't-decel-ms',   val: 'v-decel-ms',   key: 'decelMs',    fmt: v => Math.round(v) },
  { id: 't-curve',      val: 'v-curve',      key: 'curveRatio', fmt: v => v.toFixed(2)  },
];

tuningDefs.forEach(({ id, val, key, fmt }) => {
  const input = document.getElementById(id);
  const label = document.getElementById(val);
  input.addEventListener('input', () => {
    params[key] = parseFloat(input.value);
    label.textContent = fmt(params[key]);
    if (tuningOpen) updateGraphs();
  });
});

// チューニングパネル開閉
const tuningPanel     = document.getElementById('tuning-panel');
const tuningToggleBtn = document.getElementById('tuning-toggle-btn');
let tuningOpen = false;
const graphs = document.getElementById('graphs');
const canvasAccel = document.getElementById('canvas-accel');
const canvasDecel = document.getElementById('canvas-decel');

function drawGraph(canvas, points, color) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth || canvas.parentElement.offsetWidth;
  const h = 70;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const pad = { top: 6, right: 6, bottom: 18, left: 28 };
  const gw = w - pad.left - pad.right;
  const gh = h - pad.top - pad.bottom;

  // グリッド
  ctx.strokeStyle = '#1e1e2e';
  ctx.lineWidth = 1;
  [0.25, 0.5, 0.75, 1.0].forEach(r => {
    const y = pad.top + gh * (1 - r);
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + gw, y);
    ctx.stroke();
  });

  // 軸ラベル
  ctx.fillStyle = '#4a4a6a';
  ctx.font = `${8 * dpr / dpr}px Share Tech Mono, monospace`;
  ctx.textAlign = 'right';
  ctx.fillText('MAX', pad.left - 3, pad.top + 4);
  ctx.fillText('0', pad.left - 3, pad.top + gh + 4);

  // 時間軸ラベル（最後の時間）
  const totalMs = points.length * 50;
  ctx.textAlign = 'center';
  ctx.fillText(`${totalMs}ms`, pad.left + gw, h - 4);

  // 折れ線
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  points.forEach((v, i) => {
    const x = pad.left + (i / (points.length - 1)) * gw;
    const y = pad.top  + gh * (1 - v);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // 塗りつぶし
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + gh);
  grad.addColorStop(0, color + '55');
  grad.addColorStop(1, color + '00');
  ctx.fillStyle = grad;
  ctx.beginPath();
  points.forEach((v, i) => {
    const x = pad.left + (i / (points.length - 1)) * gw;
    const y = pad.top  + gh * (1 - v);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.left + gw, pad.top + gh);
  ctx.lineTo(pad.left,      pad.top + gh);
  ctx.closePath();
  ctx.fill();
}

function simulateAccel() {
  const pts = [];
  let v = params.initSpeed / params.maxSpeed;
  const snap = 3 / params.maxSpeed;
  for (let i = 0; i < 60; i++) {
    pts.push(Math.min(v, 1));
    if (v >= 1) break;
    const diff = 1 - v;
    if (diff < snap) { v = 1; break; }
    v += diff * params.accelEase;
  }
  pts.push(1);
  return pts;
}

function simulateDecel() {
  const pts = [];
  const step = params.maxSpeed / (params.decelMs / 50) / params.maxSpeed;
  let v = 1;
  while (v > 0) {
    pts.push(v);
    v = Math.max(0, v - step);
  }
  pts.push(0);
  return pts;
}

function updateGraphs() {
  requestAnimationFrame(() => {
    drawGraph(canvasAccel, simulateAccel(), '#00e5ff');
    drawGraph(canvasDecel, simulateDecel(), '#ff3d71');
  });
}

function toggleTuning(e) {
  if (e) e.preventDefault();
  tuningOpen = !tuningOpen;
  tuningPanel.classList.toggle('open', tuningOpen);
  tuningToggleBtn.classList.toggle('active', tuningOpen);
  graphs.classList.toggle('open', tuningOpen);
  if (tuningOpen) updateGraphs();
}
tuningToggleBtn.addEventListener('touchstart', toggleTuning, { passive: false });
tuningToggleBtn.addEventListener('click', () => toggleTuning(null));

// ── 速度・慣性制御 ───────────────────────────────────
let currentRight = 0;
let currentLeft  = 0;
let currentCmd   = null;
let loopTimer    = null;

function accelToward(current, target) {
  if (current === target) return target;
  const diff = target - current;
  if (Math.abs(diff) < ACCEL_SNAP) return target;
  return current + diff * params.accelEase;
}

function decelToward(current, target, step) {
  if (current < target) return Math.min(current + step, target);
  if (current > target) return Math.max(current - step, target);
  return current;
}

function updateSpeedBar(right, left, braking) {
  const scale = Math.max(Math.abs(right), Math.abs(left)) / params.maxSpeed;
  speedBar.style.width = `${Math.min(scale, 1) * 100}%`;
  speedBar.classList.toggle('braking', braking);
}

function startLoop() {
  if (loopTimer) return;
  loopTimer = setInterval(() => {
    const vecs = getCmdVecs();
    let targetRight = 0;
    let targetLeft  = 0;
    if (currentCmd && vecs[currentCmd]) {
      const [r, l] = vecs[currentCmd];
      targetRight = r * params.maxSpeed;
      targetLeft  = l * params.maxSpeed;
    }

    if (currentCmd) {
      currentRight = accelToward(currentRight, targetRight);
      currentLeft  = accelToward(currentLeft,  targetLeft);
    } else {
      const step = getDecelStep();
      currentRight = decelToward(currentRight, 0, step);
      currentLeft  = decelToward(currentLeft,  0, step);
    }

    send(driveDirect(currentRight, currentLeft));

    const braking = !currentCmd && (currentRight !== 0 || currentLeft !== 0);
    updateSpeedBar(currentRight, currentLeft, braking);

    if (!currentCmd && currentRight === 0 && currentLeft === 0) {
      clearInterval(loopTimer);
      loopTimer = null;
      updateSpeedBar(0, 0, false);
      setLog('stop');
    } else {
      const spd = Math.round(Math.max(Math.abs(currentRight), Math.abs(currentLeft)));
      setLog(`${currentCmd || 'braking'} ${spd}mm/s`);
    }
  }, TICK_MS);
}

function pressCmd(cmd) {
  currentCmd = cmd;
  const vecs = getCmdVecs();
  const [r, l] = vecs[cmd];
  // 目標と逆方向でなければ初速を付与
  if (Math.sign(currentRight) !== -Math.sign(r)) currentRight = r * params.initSpeed;
  if (Math.sign(currentLeft)  !== -Math.sign(l)) currentLeft  = l * params.initSpeed;
  startLoop();
}

function releaseCmd() {
  currentCmd = null;
  if (!loopTimer) send(driveDirect(0, 0));
}

// ── ボタンイベント ───────────────────────────────────
Object.keys(getCmdVecs()).forEach(cmd => {
  const btn = document.getElementById(`btn-${cmd}`);
  if (!btn) return;
  const onStart = (e) => { e.preventDefault(); btn.classList.add('active');    pressCmd(cmd); };
  const onEnd   = (e) => { e.preventDefault(); btn.classList.remove('active'); releaseCmd();  };
  btn.addEventListener('touchstart',  onStart, { passive: false });
  btn.addEventListener('touchend',    onEnd,   { passive: false });
  btn.addEventListener('touchcancel', onEnd,   { passive: false });
  btn.addEventListener('mousedown',   onStart);
  btn.addEventListener('mouseup',     onEnd);
  btn.addEventListener('mouseleave',  onEnd);
});

// 停止ボタン
const stopBtn = document.getElementById('btn-stop');
function hardStop(e) {
  if (e) e.preventDefault();
  currentCmd = null;
  currentRight = 0;
  currentLeft  = 0;
  clearInterval(loopTimer);
  loopTimer = null;
  send(driveDirect(0, 0));
  updateSpeedBar(0, 0, false);
  setLog('stop');
}
stopBtn.addEventListener('touchstart', (e) => { hardStop(e); stopBtn.classList.add('active'); },    { passive: false });
stopBtn.addEventListener('touchend',   (e) => { e.preventDefault(); stopBtn.classList.remove('active'); }, { passive: false });
stopBtn.addEventListener('mousedown',  (e) => { hardStop(e); stopBtn.classList.add('active'); });
stopBtn.addEventListener('mouseup',    ()  => stopBtn.classList.remove('active'));

// Safe/Full トグル
let isSafe = true;
const modeBtn   = document.getElementById('mode-btn');
const modeLabel = document.getElementById('mode-label');
const modeIcon  = document.getElementById('mode-icon');

function updateModeUI() {
  if (isSafe) {
    modeLabel.textContent = 'SAFE';
    modeIcon.innerHTML = '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>';
    modeBtn.style.borderColor = '';
  } else {
    modeLabel.textContent = 'FULL';
    modeIcon.innerHTML = '<circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
    modeBtn.style.borderColor = 'var(--accent2)';
  }
}
function toggleMode(e) {
  if (e) e.preventDefault();
  isSafe = !isSafe;
  updateModeUI();
  send(oiCmd(isSafe ? OI_SAFE : OI_FULL));
  setLog(isSafe ? 'mode: safe' : 'mode: full');
}
modeBtn.addEventListener('touchstart', toggleMode, { passive: false });
modeBtn.addEventListener('click', () => toggleMode(null));

connect();
</script>
</body>
</html>
